{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="relative flex items-center justify-center min-h-[60vh] text-center pt-24">
  <div class="absolute inset-0 bg-gradient-to-br from-purple-500 via-green-500 to-red-500"></div>

  <div class="relative z-10 max-w-2xl px-6">
    <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4">Login</h1>
    <p class="text-lg text-gray-200">
      Access your account to continue exploring cafe insights.
    </p>
  </div>
</section>

<section class="container mx-auto px-6 py-16 flex justify-center">
  <div class="w-full max-w-md bg-neutral-900 border border-neutral-800 rounded-xl shadow-lg p-10">
    <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>

    <form action="{{ url_for('main.login') }}" method="POST" class="space-y-6">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-neutral-300 mb-2">Email</label>
        <input type="email" id="email" name="email" required
               class="w-full px-4 py-3 rounded-lg bg-neutral-800 text-white border border-neutral-700 
                      focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>

      <!-- Password with toggle -->
      <div class="relative">
        <label for="password" class="block text-sm font-medium text-neutral-300 mb-2">Password</label>
        <input type="password" id="password" name="password" required
               class="w-full px-4 py-3 rounded-lg bg-neutral-800 text-white border border-neutral-700 
                      focus:ring-2 focus:ring-blue-500 focus:outline-none pr-10">
        <button type="button" id="togglePassword" class="absolute right-3 top-[38px] text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path id="eyeIcon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path id="eyeOutline" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </button>
      </div>

      <div class="text-right">
        <a href="#" class="text-sm text-blue-400 hover:underline">Forgot password?</a>
      </div>

      <div class="text-center">
        <button type="submit"
                class="w-full py-3 px-6 rounded-lg bg-blue-600 hover:bg-blue-700 
                       text-white font-semibold transition">
          Login
        </button>
      </div>
    </form>

    <p class="text-sm text-neutral-400 mt-6 text-center">
      Don’t have an account? 
      <a href="{{ url_for('main.signup') }}" class="text-blue-400 hover:underline">Sign Up</a>
    </p>
  </div>
</section>

<script>
  const password = document.getElementById('password');
  const togglePassword = document.getElementById('togglePassword');
  const eyeIcon = document.getElementById('eyeIcon');

  togglePassword.addEventListener('click', () => {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);

    // Swap SVG path for open/closed eye
    if (type === 'text') {
      eyeIcon.setAttribute('d', 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.269-2.943-9.543-7a10.05 10.05 0 012.02-3.705M15 12a3 3 0 11-6 0 3 3 0 016 0z'); // eye open
    } else {
      eyeIcon.setAttribute('d', 'M15 12a3 3 0 11-6 0 3 3 0 016 0z'); // eye closed
    }
  });
</script>
{% endblock %}
